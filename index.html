<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTÜ UTAT | Admin Yetkili Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .hidden { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .kanban-column { background-color: #f1f5f9; min-height: 750px; border-radius: 24px; border: 2px dashed #cbd5e1; }
        .task-card { background: white; transition: all 0.2s ease; border: 1px solid #e2e8f0; border-radius: 24px; }
        .admin-mode .task-card { cursor: grab; }
        .admin-mode .task-card:active { cursor: grabbing; transform: scale(0.98); }
        .responsible-badge { background: #003057; color: white; padding: 3px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; }
        .time-urgent { color: #ef4444; font-weight: 800; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        select[multiple] { height: 160px; scrollbar-width: thin; }
        .xp-bar-fill { transition: width 1s ease; background: linear-gradient(90deg, #003057, #3b82f6); }
    </style>
</head>
<body class="user-mode"> <div id="login-screen" class="flex items-center justify-center h-screen px-4 bg-slate-50">

            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden">

        <main class="p-6 lg:p-12 max-w-[1600px] mx-auto">
            <div id="admin-form-container" class="bg-white p-8 rounded-[2.5rem] mb-12 shadow-sm border border-slate-100 hidden">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-10">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Operasyon Adı</label>
                        <input type="text" id="taskName" placeholder="Neler Yapılacak?" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none focus:bg-white shadow-inner">
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Sorumlu YK Üyeleri</label>
                        <select id="responsibleMembers" multiple class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none font-bold text-slate-700 shadow-inner">
                            <optgroup label="Başkanlık"><option value="Melih AYDOĞAN">Melih AYDOĞAN</option></optgroup>
                            <optgroup label="Organizasyon"><option>Yunus Emre KATAR</option><option>Betül AKTEPE</option><option>Mehmet AKDOĞAN</option><option>Sude GENÇ</option><option>Sinem AKYILDIZ</option></optgroup>
                            <optgroup label="Dış İlişkiler"><option>Ferhat ÖMEROĞLU</option><option>Diana SECHERLI</option><option>Eymen KURT</option></optgroup>
                            <optgroup label="Basın Medya"><option>Helen YILMAZ</option><option>İzem ÇETİN</option><option>Amirzhan KUNAPİYA</option></optgroup>
                            <optgroup label="Sponsorluk"><option>Yaren TUNCER</option><option>Rümeysa TEMÜR</option></optgroup>
                        </select>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Deadline</label>
                        <input type="date" id="deadline" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none focus:bg-white shadow-inner">
                    </div>
                    <div class="flex items-end pb-4">
                        <button id="addTaskBtn" class="w-full bg-[#003057] text-white p-5 rounded-2xl font-black shadow-xl hover:shadow-blue-900/30 transition transform active:scale-95 uppercase text-xs tracking-widest">Görevi Ata 🚀</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10" id="kanban-board">
                <div class="kanban-column p-8" id="todo-col">
                    <h4 class="font-black text-slate-400 text-[11px] uppercase mb-10 tracking-[0.3em] flex justify-between items-center px-2">BEKLEYEN <span id="todo-count" class="bg-white px-2.5 py-1 rounded-xl shadow-sm">0</span></h4>
                    <div id="todo" class="space-y-6 min-h-[600px]"></div>
                </div>
                <div class="kanban-column p-8" id="doing-col">
                    <h4 class="font-black text-blue-600 text-[11px] uppercase mb-10 tracking-[0.3em] flex justify-between items-center px-2">İŞLEMDE <span id="doing-count" class="bg-blue-600 text-white px-2.5 py-1 rounded-xl shadow-sm">0</span></h4>
                    <div id="doing" class="space-y-6 min-h-[600px]"></div>
                </div>
                <div class="kanban-column p-8" id="done-col">
                    <h4 class="font-black text-emerald-600 text-[11px] uppercase mb-10 tracking-[0.3em] flex justify-between items-center px-2">TAMAMLANDI <span id="done-count" class="bg-emerald-600 text-white px-2.5 py-1 rounded-xl shadow-sm">0</span></h4>
                    <div id="done" class="space-y-6 min-h-[600px]"></div>
                </div>
            </div>
        </main>
    </div>
